<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ATMOSTAT</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0d12;--bg2:#0f1318;--bg3:#141920;--bg4:#1a2030;--border:#1e2a38;--bord2:#263344;--text:#7a9ab0;--text2:#b8d0e0;--bright:#e2eff8;--dim:#334a5a;--c0:#ff6b6b;--c1:#4fc3f7;--c2:#aed581;--c3:#ffa94d;--c4:#ce93d8;--c5:#4dd0e1;--c6:#80cbc4;--c7:#90caf9;--c8:#f48fb1;--green:#4caf50;--orange:#ff9800;--red:#f44336;--mono:'JetBrains Mono',monospace;--sans:'Figtree',sans-serif;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;display:flex;flex-direction:column;-webkit-tap-highlight-color:transparent;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 120% 60% at -10% 0%,rgba(79,195,247,.04) 0%,transparent 50%),radial-gradient(ellipse 80% 80% at 110% 100%,rgba(255,107,107,.03) 0%,transparent 50%);}
#header{flex-shrink:0;background:rgba(10,13,18,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 14px;height:52px;display:flex;align-items:center;gap:10px;position:relative;z-index:100;}
.logo{display:flex;align-items:center;gap:9px;flex-shrink:0;}
.logo-dot{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#4fc3f7,rgba(79,195,247,.2));display:flex;align-items:center;justify-content:center;font-size:15px;box-shadow:0 0 14px rgba(79,195,247,.25);}
.logo-txt{font-family:var(--sans);font-weight:900;font-size:17px;color:var(--bright);letter-spacing:-.5px;}
.logo-ver{font-size:9px;color:#4fc3f7;letter-spacing:3px;text-transform:uppercase;}
#lieu-bar{display:flex;gap:6px;margin-left:auto;align-items:center;overflow-x:auto;scrollbar-width:none;}
#lieu-bar::-webkit-scrollbar{display:none;}
.lieu-btn{padding:5px 12px;border-radius:16px;font-size:12px;font-weight:600;background:var(--bg3);border:1px solid var(--border);color:var(--dim);cursor:pointer;transition:all .15s;white-space:nowrap;font-family:var(--sans);}
.lieu-btn.active{background:rgba(79,195,247,.12);border-color:rgba(79,195,247,.4);color:#4fc3f7;}
.hdr-actions{display:flex;gap:6px;flex-shrink:0;margin-left:8px;}
.icon-btn{width:32px;height:32px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;font-family:var(--sans);}
.icon-btn:hover{border-color:var(--bord2);color:var(--bright);}
#module-tabs{flex-shrink:0;display:flex;overflow-x:auto;background:var(--bg2);border-bottom:1px solid var(--border);scrollbar-width:none;position:relative;z-index:99;}
#module-tabs::-webkit-scrollbar{display:none;}
.mod-tab{display:flex;align-items:center;gap:7px;padding:10px 16px;border-bottom:2px solid transparent;color:var(--dim);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0;letter-spacing:.3px;}
.mod-tab:hover{color:var(--text2);background:rgba(255,255,255,.02);}
.mod-tab.active{color:var(--bright);border-bottom-color:#4fc3f7;}
#main{flex:1;overflow-y:auto;overflow-x:hidden;position:relative;z-index:1;}
#main::-webkit-scrollbar{width:3px;}
#main::-webkit-scrollbar-track{background:var(--bg2);}
#main::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.page{display:none;padding:12px 12px 24px;}
.page.active{display:block;}
.rt-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px;position:relative;overflow:hidden;}
.rt-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--card-accent,#4fc3f7);}
.rt-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.rt-card-name{font-weight:700;font-size:15px;color:var(--bright);display:flex;align-items:center;gap:7px;}
.rt-card-sync{font-size:10px;color:var(--dim);font-family:var(--mono);}
.rt-values{display:grid;gap:0;margin-bottom:10px;}
.rt-val-item{padding:7px 0;border-bottom:1px solid var(--border);}
.rt-val-item:last-child{border-bottom:none;}
.rt-val-row{display:flex;align-items:baseline;justify-content:space-between;gap:8px;}
.rt-val-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);}
.rt-val-main{display:flex;align-items:baseline;gap:3px;}
.rt-val-num{font-family:var(--mono);font-weight:500;font-size:28px;line-height:1;}
.rt-val-unit{font-size:11px;color:var(--dim);font-family:var(--mono);}
.wind-block{display:flex;align-items:center;gap:14px;padding:8px 0;}
.compass{width:64px;height:64px;border-radius:50%;border:2px solid var(--bord2);position:relative;flex-shrink:0;background:var(--bg3);}
.compass-arrow{position:absolute;top:50%;left:50%;width:2px;height:24px;background:linear-gradient(to top,#ff6b6b,transparent);transform-origin:bottom center;transform:translateX(-50%) translateY(-100%);transition:transform .5s ease;border-radius:2px;}
.compass-n{position:absolute;top:3px;left:50%;transform:translateX(-50%);font-size:8px;color:var(--dim);}
.compass-s{position:absolute;bottom:3px;left:50%;transform:translateX(-50%);font-size:8px;color:var(--dim);}
.compass-e{position:absolute;right:4px;top:50%;transform:translateY(-50%);font-size:8px;color:var(--dim);}
.compass-o{position:absolute;left:4px;top:50%;transform:translateY(-50%);font-size:8px;color:var(--dim);}
.wind-stats{flex:1;}
.wind-stat-row{display:flex;justify-content:space-between;align-items:baseline;padding:4px 0;border-bottom:1px solid var(--border);}
.wind-stat-row:last-child{border-bottom:none;}
.ws-label{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;}
.ws-val{font-family:var(--mono);font-size:20px;color:var(--bright);}
.ws-unit{font-size:10px;color:var(--dim);}
.rain-tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:8px;}
.rain-tile{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 8px;text-align:center;}
.rain-tile-label{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);margin-bottom:5px;}
.rain-tile-val{font-family:var(--mono);font-size:20px;color:var(--c5);font-weight:500;}
.rain-tile-unit{font-size:10px;color:var(--dim);}
.period-wrap{display:flex;overflow-x:auto;gap:4px;margin-bottom:10px;scrollbar-width:none;}
.period-wrap::-webkit-scrollbar{display:none;}
.per-btn{flex-shrink:0;padding:5px 11px;border-radius:16px;background:var(--bg3);border:1px solid var(--border);color:var(--dim);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;font-family:var(--sans);}
.per-btn:hover,.per-btn.active{background:rgba(79,195,247,.1);border-color:rgba(79,195,247,.35);color:#4fc3f7;}
.custom-range{display:flex;gap:7px;align-items:center;flex-wrap:wrap;padding:9px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;margin-bottom:10px;font-size:11px;}
.custom-range input[type=date]{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:6px 9px;color:var(--bright);font-family:var(--mono);font-size:11px;color-scheme:dark;outline:none;flex:1;min-width:120px;}
.custom-range input:focus{border-color:#4fc3f7;}
.chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px;}
.chart-tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;}
.ct-btn{padding:5px 11px;border-radius:14px;font-size:11px;font-weight:600;background:var(--bg3);border:1px solid var(--border);color:var(--dim);cursor:pointer;transition:all .15s;font-family:var(--sans);}
.ct-btn.active{color:#0a0d12;border-color:transparent;font-weight:700;}
.chart-wrap{position:relative;height:200px;}
.chart-summary{display:flex;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);flex-wrap:wrap;}
.csum{flex:1;min-width:60px;text-align:center;}
.csum-v{font-family:var(--mono);font-size:17px;color:var(--bright);font-weight:500;}
.csum-k{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);margin-top:2px;}
.stat-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;align-items:center;}
.stat-lbl{font-size:10px;color:var(--dim);letter-spacing:1px;text-transform:uppercase;}
.stog{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:14px;background:var(--bg3);border:1px solid var(--border);font-size:11px;font-weight:600;color:var(--dim);cursor:pointer;transition:all .15s;user-select:none;}
.stog input{margin:0;accent-color:currentColor;}
.stog.on{border-color:currentColor;}
#auth-screen{flex:1;display:flex;align-items:center;justify-content:center;padding:20px;}
.auth-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:32px 24px;max-width:400px;width:100%;}
.auth-box h2{font-size:22px;font-weight:900;color:var(--bright);margin-bottom:6px;}
.auth-box p{font-size:11px;color:var(--dim);line-height:1.7;margin-bottom:24px;}
.fg{margin-bottom:13px;}
.fg label{display:block;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#4fc3f7;margin-bottom:5px;}
.fg input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 13px;color:var(--bright);font-family:var(--mono);font-size:12px;outline:none;transition:border-color .15s;}
.fg input:focus{border-color:#4fc3f7;}
.btn-main{width:100%;padding:12px;background:#4fc3f7;border:none;border-radius:9px;color:#07090f;font-family:var(--sans);font-size:14px;font-weight:800;cursor:pointer;transition:all .18s;letter-spacing:.3px;}
.btn-main:hover{background:#6dd0f7;transform:translateY(-1px);}
.auth-note{font-size:10px;color:var(--dim);margin-top:16px;text-align:center;line-height:1.7;}
.auth-note a{color:#4fc3f7;text-decoration:none;}
.err-box{background:rgba(244,67,54,.08);border:1px solid rgba(244,67,54,.25);border-radius:7px;padding:9px 12px;font-size:11px;color:#ef9a9a;margin-top:10px;display:none;}
.loader{text-align:center;padding:40px 20px;color:var(--dim);font-size:11px;letter-spacing:1px;}
.loader::before{content:'';display:block;width:26px;height:26px;border:2px solid var(--border);border-top-color:#4fc3f7;border-radius:50%;margin:0 auto 12px;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--bg3);border:1px solid var(--bord2);border-radius:10px;padding:10px 18px;font-size:12px;z-index:9999;transition:transform .25s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;box-shadow:0 6px 24px rgba(0,0,0,.5);}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.ok{color:#4fc3f7;border-color:rgba(79,195,247,.3);}
.toast.err{color:#ef9a9a;border-color:rgba(244,67,54,.3);}
.section-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px;}
.sc-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.sc-title{font-size:14px;font-weight:700;color:var(--bright);}
.sm-btn{padding:5px 11px;border-radius:8px;font-size:11px;font-weight:600;background:var(--bg3);border:1px solid var(--bord2);color:var(--text2);cursor:pointer;transition:all .15s;font-family:var(--sans);}
.sm-btn:hover{border-color:#4fc3f7;color:#4fc3f7;}
.alert-row{display:flex;align-items:center;gap:7px;flex-wrap:wrap;padding:8px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;}
.alert-row select,.alert-row input[type=number]{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:5px 8px;color:var(--bright);font-family:var(--mono);font-size:11px;outline:none;flex:1;min-width:65px;}
.badge{padding:2px 8px;border-radius:8px;font-size:10px;font-weight:700;}
.bOK{background:rgba(76,175,80,.12);color:#81c784;border:1px solid rgba(76,175,80,.25);}
.bWN{background:rgba(255,152,0,.12);color:#ffb74d;border:1px solid rgba(255,152,0,.25);}
.bAL{background:rgba(244,67,54,.12);color:#ef9a9a;border:1px solid rgba(244,67,54,.25);}
.exp-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:10px;}
.exp-btn{display:flex;align-items:center;gap:9px;padding:12px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:all .15s;color:var(--text);font-family:var(--sans);}
.exp-btn:hover{border-color:#4fc3f7;color:#4fc3f7;}
@media(max-width:400px){.rt-val-num{font-size:22px;}.exp-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div id="auth-screen" style="display:none">
  <div class="auth-box">
    <h2>Connexion</h2>
    <p>Identifiants Netatmo Developer pour accéder à votre station.</p>
    <div class="fg"><label>Client ID</label><input type="text" id="inp-cid" placeholder="na_client_id_..."></div>
    <div class="fg"><label>Client Secret</label><input type="password" id="inp-csec" placeholder="na_client_secret_..."></div>
    <button class="btn-main" onclick="startAuth()">Se connecter →</button>
    <div class="err-box" id="auth-err"></div>
    <p class="auth-note">Redirect URI : <strong id="redir-uri" style="color:var(--text2)"></strong><br>
    À déclarer sur <a href="https://dev.netatmo.com/apps" target="_blank">dev.netatmo.com</a></p>
  </div>
</div>
<div id="header" style="display:none">
  <div class="logo">
    <div class="logo-dot">⛅</div>
    <div><div class="logo-txt">ATMOSTAT</div><div class="logo-ver">v3</div></div>
  </div>
  <div id="lieu-bar"></div>
  <div class="hdr-actions">
    <button class="icon-btn" onclick="refreshAll()" title="Actualiser">↻</button>
    <button class="icon-btn" onclick="logout()" title="Déconnexion">⏻</button>
  </div>
</div>
<div id="module-tabs" style="display:none"></div>
<div id="main" style="display:none"></div>
<div class="toast" id="toast"></div>
<script>
const REDIRECT=location.href.split('?')[0].split('#')[0];
const AUTH_URL='https://api.netatmo.com/oauth2/authorize';
const TOKEN_URL='https://api.netatmo.com/oauth2/token';
const API='https://api.netatmo.com/api';
document.getElementById('redir-uri').textContent=REDIRECT;

const BEAUFORT=[[0.5,'Calme'],[1.5,'Très légère brise'],[3.3,'Légère brise'],[5.5,'Petite brise'],[7.9,'Jolie brise'],[10.7,'Brise fraîche'],[13.8,'Vent frais'],[17,'Grand frais'],[20.7,'Coup de vent'],[24.4,'Fort coup de vent'],[28.4,'Tempête'],[32.6,'Violente tempête'],[999,'Ouragan']];
function beaufort(kmh){const ms=kmh/3.6;for(let i=0;i<BEAUFORT.length;i++)if(ms<BEAUFORT[i][0])return{bft:i,desc:BEAUFORT[i][1]};return{bft:12,desc:'Ouragan'};}
function dewPoint(t,h){const a=17.271,b=237.7,g=(a*t)/(b+t)+Math.log(h/100);return(b*g)/(a-g);}
function windDir(deg){const d=['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSO','SO','OSO','O','ONO','NO','NNO'];return d[Math.round(deg/22.5)%16];}

const S={
  token:localStorage.getItem('na_tok'),refresh:localStorage.getItem('na_ref'),
  expiry:+localStorage.getItem('na_exp')||0,cid:localStorage.getItem('na_cid')||'',
  csec:localStorage.getItem('na_csec')||'',devices:[],currentLieu:0,
  currentMods:[],charts:{},chartData:{},
  alerts:JSON.parse(localStorage.getItem('na_alerts')||'[]'),
  stats:{min:false,max:false,avg:false},hours:24,customFrom:null,customTo:null,
};
if(S.cid)document.getElementById('inp-cid').value=S.cid;

function startAuth(){
  const cid=document.getElementById('inp-cid').value.trim();
  const csec=document.getElementById('inp-csec').value.trim();
  if(!cid||!csec){authErr('Remplissez les deux champs.');return;}
  localStorage.setItem('na_cid',cid);localStorage.setItem('na_csec',csec);
  S.cid=cid;S.csec=csec;
  location.href=AUTH_URL+'?'+new URLSearchParams({client_id:cid,redirect_uri:REDIRECT,scope:'read_station',response_type:'code',state:'x'});
}
async function handleCode(){
  const p=new URLSearchParams(location.search),code=p.get('code');
  if(!code)return false;
  history.replaceState({},'',REDIRECT);
  try{
    const r=await fetch(TOKEN_URL,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body:new URLSearchParams({grant_type:'authorization_code',code,redirect_uri:REDIRECT,
        client_id:localStorage.getItem('na_cid'),client_secret:localStorage.getItem('na_csec')})});
    const d=await r.json();
    if(d.access_token){saveTokens(d);return true;}
    authErr(d.error_description||d.error);return false;
  }catch(e){authErr(e.message);return false;}
}
function saveTokens(d){
  S.token=d.access_token;S.refresh=d.refresh_token;S.expiry=Date.now()+d.expires_in*1000;
  localStorage.setItem('na_tok',S.token);localStorage.setItem('na_ref',S.refresh);localStorage.setItem('na_exp',S.expiry);
}
async function ensureToken(){
  if(S.token&&Date.now()<S.expiry-60000)return true;
  if(!S.refresh)return false;
  try{
    const r=await fetch(TOKEN_URL,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body:new URLSearchParams({grant_type:'refresh_token',refresh_token:S.refresh,client_id:S.cid,client_secret:S.csec})});
    const d=await r.json();if(d.access_token){saveTokens(d);return true;}return false;
  }catch{return false;}
}
function logout(){['na_tok','na_ref','na_exp'].forEach(k=>localStorage.removeItem(k));S.token=null;location.reload();}
function authErr(msg){const e=document.getElementById('auth-err');e.textContent=msg;e.style.display='block';}

async function apiGet(ep,params={}){
  if(!await ensureToken())throw new Error('Session expirée');
  const u=new URL(API+ep);Object.entries(params).forEach(([k,v])=>u.searchParams.set(k,v));
  const r=await fetch(u,{headers:{Authorization:'Bearer '+S.token}});
  const d=await r.json();if(d.error)throw new Error(d.error.message||JSON.stringify(d.error));return d;
}
async function getMeasure(deviceId,moduleId,types,from,to,scale){
  const p={device_id:deviceId,scale,type:types.join(','),date_begin:Math.floor(from/1000),date_end:Math.floor(to/1000),optimize:false,real_time:false};
  if(moduleId)p.module_id=moduleId;
  const d=await apiGet('/getmeasure',p);return d.body;
}
function pickScale(hours){if(hours<=1)return'5min';if(hours<=6)return'30min';if(hours<=24)return'1hour';if(hours<=168)return'3hours';if(hours<=720)return'1day';return'1week';}
function getRange(){if(S.customFrom&&S.customTo)return{from:S.customFrom,to:S.customTo};return{from:Date.now()-S.hours*3600000,to:Date.now()};}
function parseMeasure(raw){return Object.entries(raw).map(([ts,arr])=>{const v=Array.isArray(arr)?arr[0]:arr;return v!=null?{t:parseInt(ts)*1000,v}:null;}).filter(Boolean).sort((a,b)=>a.t-b.t);}

function getLieux(){
  const map={};
  S.devices.forEach(dev=>{const city=dev.place?.city||dev.place?.timezone||dev.station_name||dev._id;if(!map[city])map[city]=[];map[city].push(dev);});
  return Object.entries(map).map(([name,devs])=>({name,devs}));
}
function getModules(lieu){
  const mods=[];
  lieu.devs.forEach(dev=>{
    mods.push({type:'indoor',deviceId:dev._id,moduleId:null,name:dev.station_name,data:dev.dashboard_data||{},icon:'🏠'});
    (dev.modules||[]).forEach(mod=>{
      let type='indoor',icon='🏠';
      if(mod.type==='NAModule1'){type='outdoor';icon='🌿';}
      else if(mod.type==='NAModule3'){type='rain';icon='🌧';}
      else if(mod.type==='NAModule2'){type='wind';icon='💨';}
      mods.push({type,deviceId:dev._id,moduleId:mod._id,name:mod.module_name,data:mod.dashboard_data||{},icon,moduleType:mod.type});
    });
  });
  return mods;
}

async function refreshAll(){
  try{
    const d=await apiGet('/getstationsdata');
    S.devices=d.body.devices||[];
    if(!S.devices.length){toast('Aucune station','err');return;}
    buildUI();
  }catch(e){toast('Erreur: '+e.message,'err');}
}

function buildUI(){
  const lieux=getLieux();
  const lb=document.getElementById('lieu-bar');

async function loadOutdoorChart(page,m,idx){
  const p='mod'+idx,active=page.querySelector('.ct-btn.active');

  const cfgs={Temperature:{label:'Température',unit:'°C'},Humidity:{label:'Humidité',unit:'%'},dewpoint:{label:'Point de rosée',unit:'°C'}};
  const cfg={...cfgs[sensor],color};
  const{from,to}=getRange(),hours=S.hours||(to-from)/3600000,scale=pickScale(hours);
  try{
    let pts;
    if(sensor==='dewpoint'){
      const raw=await getMeasure(m.deviceId,m.moduleId,['Temperature','Humidity'],from,to,scale);
      pts=Object.entries(raw).map(([ts,arr])=>{if(!Array.isArray(arr)||arr[0]==null||arr[1]==null)return null;return{t:parseInt(ts)*1000,v:dewPoint(arr[0],arr[1])};}).filter(Boolean).sort((a,b)=>a.t-b.t);
    }else{

// CHARTS
const CO={responsive:true,maintainAspectRatio:false,interaction:{intersect:false,mode:'index'},
  plugins:{legend:{display:false},tooltip:{backgroundColor:'#0f1318',borderColor:'#1e2a38',borderWidth:1,titleColor:'#334a5a',bodyColor:'#e2eff8',titleFont:{family:'JetBrains Mono',size:10},bodyFont:{family:'JetBrains Mono',size:12}}},
  scales:{x:{ticks:{color:'#334a5a',font:{family:'JetBrains Mono',size:9},maxTicksLimit:7},grid:{color:'#1a2030'},border:{color:'#1a2030'}},y:{ticks:{color:'#334a5a',font:{family:'JetBrains Mono',size:9}},grid:{color:'#1a2030'},border:{color:'#1a2030'}}}};
function fmtL(d,h){if(!h||h<=6)return d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});if(h<=24)return d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});if(h<=168)return d.toLocaleDateString('fr-FR',{weekday:'short',hour:'2-digit'});if(h<=720)return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'short'});return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'2-digit'});}

function drawLine(p,pts,cfg,hours,fill=true){
  const key=p+'-chart',canvas=document.getElementById(key);if(!canvas)return;
  const ctx=canvas.getContext('2d');if(S.charts[key])S.charts[key].destroy();
  const gr=ctx.createLinearGradient(0,0,0,200);gr.addColorStop(0,cfg.color+'55');gr.addColorStop(1,cfg.color+'00');
  const vals=pts.map(q=>q.v),mn=vals.length?Math.min(...vals):0,mx=vals.length?Math.max(...vals):0,avg=vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:0;
  const ds=[{label:cfg.label,data:vals,borderColor:cfg.color,backgroundColor:fill?gr:'transparent',borderWidth:2,fill,tension:.35,pointRadius:vals.length>400?0:2,pointHoverRadius:5,order:1}];
  if(S.stats.min)ds.push({label:'Min',data:vals.map(()=>mn),borderColor:'#4fc3f7',borderWidth:1,borderDash:[4,4],pointRadius:0,fill:false,tension:0,order:2});
  if(S.stats.max)ds.push({label:'Max',data:vals.map(()=>mx),borderColor:'#ff6b6b',borderWidth:1,borderDash:[4,4],pointRadius:0,fill:false,tension:0,order:3});
  if(S.stats.avg)ds.push({label:'Moy',data:vals.map(()=>avg),borderColor:'#ffa94d',borderWidth:1.5,borderDash:[6,3],pointRadius:0,fill:false,tension:0,order:4});
  const opts=JSON.parse(JSON.stringify(CO));
  opts.plugins.tooltip.callbacks={label:c=>` ${c.dataset.label}: ${typeof c.parsed.y==='number'?c.parsed.y.toFixed(1):c.parsed.y} ${cfg.unit}`};
  S.charts[key]=new Chart(ctx,{type:'line',data:{labels:pts.map(q=>fmtL(new Date(q.t),hours)),datasets:ds},options:opts});
  mkSum(p,vals,cfg);
}
function drawBar(p,pts,cfg,hours){
  const key=p+'-chart',canvas=document.getElementById(key);if(!canvas)return;
  const ctx=canvas.getContext('2d');if(S.charts[key])S.charts[key].destroy();
  const vals=pts.map(q=>q.v);
  const opts=JSON.parse(JSON.stringify(CO));opts.plugins.tooltip.callbacks={label:c=>` ${c.parsed.y.toFixed(1)} ${cfg.unit}`};
  S.charts[key]=new Chart(ctx,{type:'bar',data:{labels:pts.map(q=>fmtL(new Date(q.t),hours)),datasets:[{label:cfg.label,data:vals,backgroundColor:cfg.color+'88',borderColor:cfg.color,borderWidth:1,borderRadius:3}]},options:opts});
  mkSum(p,vals,cfg);
}
function drawDual(p,pW,pG,hours){
  const key=p+'-chart',canvas=document.getElementById(key);if(!canvas)return;
  const ctx=canvas.getContext('2d');if(S.charts[key])S.charts[key].destroy();
  const gr=ctx.createLinearGradient(0,0,0,200);gr.addColorStop(0,'#80cbc455');gr.addColorStop(1,'#80cbc400');
  const opts=JSON.parse(JSON.stringify(CO));opts.plugins.legend.display=true;
  opts.plugins.legend.labels={color:'#7a9ab0',font:{family:'JetBrains Mono',size:10},boxWidth:12};
  opts.plugins.tooltip.callbacks={label:c=>` ${c.dataset.label}: ${c.parsed.y.toFixed(1)} km/h`};
  S.charts[key]=new Chart(ctx,{type:'line',data:{labels:pW.map(q=>fmtL(new Date(q.t),hours)),datasets:[
    {label:'Vent moy.',data:pW.map(q=>q.v),borderColor:'#80cbc4',backgroundColor:gr,borderWidth:2,fill:true,tension:.35,pointRadius:0},
    {label:'Rafales',data:pG.map(q=>q.v),borderColor:'#90caf9',backgroundColor:'transparent',borderWidth:1.5,fill:false,tension:.35,pointRadius:0,borderDash:[4,3]},
  ]},options:opts});
  mkSum(p,pW.map(q=>q.v),{label:'Vent',unit:'km/h',color:'#80cbc4'});
}
function mkSum(p,vals,cfg){
  const el=document.getElementById(p+'-sum');if(!el||!vals.length)return;
  const mn=Math.min(...vals),mx=Math.max(...vals),avg=vals.reduce((a,b)=>a+b,0)/vals.length;
  el.innerHTML=`<div class="csum"><div class="csum-v" style="color:#4fc3f7">${mn.toFixed(1)}</div><div class="csum-k">Min ${cfg.unit}</div></div><div class="csum"><div class="csum-v" style="color:#ff6b6b">${mx.toFixed(1)}</div><div class="csum-k">Max ${cfg.unit}</div></div><div class="csum"><div class="csum-v" style="color:#ffa94d">${avg.toFixed(1)}</div><div class="csum-k">Moy ${cfg.unit}</div></div><div class="csum"><div class="csum-v">${vals.length}</div><div class="csum-k">Points</div></div>`;
}

// ALERTS
function alertsHTML(p){return`<div class="section-card"><div class="sc-header"><div class="sc-title">⚡ Alertes</div><button class="sm-btn" onclick="addAl('${p}')">+ Ajouter</button></div><div id="${p}-alerts"></div><div id="${p}-alst" style="font-size:11px;margin-top:6px"></div></div>`;}
function renderAlerts(p){
  const el=document.getElementById(p+'-alerts');if(!el)return;
  const my=S.alerts.filter(a=>a.p===p);
  if(!my.length){el.innerHTML='<div style="font-size:11px;color:var(--dim);padding:2px 0">Aucune alerte.</div>';return;}
  el.innerHTML=my.map(a=>{const i=S.alerts.indexOf(a);return`<div class="alert-row">
    <select onchange="updAl(${i},'sensor',this.value)">
      ${[['Temperature','🌡 Temp.'],['Humidity','💧 Hum.'],['Pressure','📊 Pression'],['Noise','🔊 Bruit'],['CO2','🌿 CO₂'],['WindStrength','💨 Vent'],['Rain','🌧 Pluie']].map(([k,l])=>`<option value="${k}"${a.sensor===k?' selected':''}>${l}</option>`).join('')}
    </select>
    <select onchange="updAl(${i},'op',this.value)" style="max-width:90px">
      <option value=">"${a.op==='>'?' selected':''}>&gt; sup.</option>
      <option value="<"${a.op==='<'?' selected':''}>&lt; inf.</option>
    </select>
    <input type="number" value="${a.threshold}" step="0.1" onchange="updAl(${i},'threshold',parseFloat(this.value))" style="max-width:65px">
    <span class="badge ${a.status==='danger'?'bAL':a.status==='warning'?'bWN':'bOK'}">${a.status==='danger'?'🔴 Alerte':a.status==='warning'?'🟡 Proche':'🟢 OK'}</span>
    <button class="icon-btn" style="flex-shrink:0" onclick="delAl(${i},'${p}')">✕</button>
  </div>`;}).join('');
}
function addAl(p){S.alerts.push({p,sensor:'Temperature',op:'>',threshold:30,status:'ok'});saveAl();renderAlerts(p);}
function updAl(i,k,v){S.alerts[i][k]=v;saveAl();}
function delAl(i,p){S.alerts.splice(i,1);saveAl();renderAlerts(p);}
function saveAl(){localStorage.setItem('na_alerts',JSON.stringify(S.alerts));}

// EXPORT
function exportHTML(p){return`<div class="section-card"><div class="sc-title">📤 Export</div><div class="exp-grid"><button class="exp-btn" onclick="doExp('${p}','csv')"><span style="font-size:20px">📊</span><span><div style="font-size:12px;font-weight:600">CSV</div><div style="font-size:10px;color:var(--dim)">Pour Excel</div></span></button><button class="exp-btn" onclick="doExp('${p}','json')"><span style="font-size:20px">📋</span><span><div style="font-size:12px;font-weight:600">JSON</div><div style="font-size:10px;color:var(--dim)">Format structuré</div></span></button></div></div>`;}
function doExp(p,fmt){
  const data=S.chartData[p];if(!data){toast('Chargez un graphique d\'abord','err');return;}
  const{pts,cfg}=data,fname=`netatmo_${cfg.label.replace(/\s/g,'_')}_${new Date().toISOString().slice(0,10)}`;
  if(fmt==='csv'){const lines=[`Datetime,${cfg.label} (${cfg.unit}),Timestamp`];pts.forEach(q=>lines.push(`"${new Date(q.t).toLocaleString('fr-FR')}",${q.v},${q.t}`));dl(lines.join('\n'),fname+'.csv','text/csv');toast('CSV exporté ✓');}
  else{dl(JSON.stringify({label:cfg.label,unit:cfg.unit,exported:new Date().toISOString(),data:pts.map(q=>({datetime:new Date(q.t).toISOString(),value:q.v}))},null,2),fname+'.json','application/json');toast('JSON exporté ✓');}
}
function dl(c,n,t){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([c],{type:t}));a.download=n;a.click();}

// HELPERS
function tCol(t){if(typeof t!=='number')return'var(--bright)';if(t<0)return'#90caf9';if(t<10)return'#4fc3f7';if(t<20)return'#aed581';if(t<30)return'#ffa94d';return'#ff6b6b';}
function co2Q(v){if(v<800)return{label:'Bon',style:'background:rgba(76,175,80,.15);color:#81c784;'};if(v<1200)return{label:'Moyen',style:'background:rgba(255,152,0,.15);color:#ffb74d;'};return{label:'Mauvais',style:'background:rgba(244,67,54,.15);color:#ef9a9a;'};}
function fmtSync(utc){if(!utc)return'—';const d=new Date(utc*1000),diff=Math.round((Date.now()-d)/60000);if(diff<1)return'À l\'instant';if(diff<60)return`Il y a ${diff} min`;return d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});}

let _tt;
function toast(msg,type='ok'){const el=document.getElementById('toast');el.textContent=msg;el.className=`toast show ${type}`;clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),3000);}

function showAuth(){document.getElementById('auth-screen').style.display='flex';document.getElementById('header').style.display='none';document.getElementById('module-tabs').style.display='none';document.getElementById('main').style.display='none';}
function showApp(){document.getElementById('auth-screen').style.display='none';document.getElementById('header').style.display='flex';document.getElementById('module-tabs').style.display='flex';document.getElementById('main').style.display='block';}

async function init(){
  if(location.search.includes('code=')){const ok=await handleCode();if(!ok){showAuth();return;}}
  if(S.token){showApp();try{await refreshAll();}catch(e){toast('Reconnexion nécessaire','err');setTimeout(logout,2000);}}else{showAuth();}
}
init();
</script>
</body>
</html>
