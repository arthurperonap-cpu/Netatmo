<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ATMOSTAT</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;900&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#090c10;--bg2:#0e1219;--bg3:#131820;--bg4:#19202c;
  --border:#1d2b38;--bord2:#253545;
  --text:#7090a8;--text2:#b0c8dc;--bright:#deeef8;--dim:#2e4255;
  --c-temp:#ff6b6b;--c-hum:#4fc3f7;--c-pres:#a5d86e;--c-co2:#ffa94d;
  --c-noise:#ce93d8;--c-rain:#40c4ff;--c-wind:#4dd0e1;--c-gust:#90caf9;--c-dew:#f48fb1;
  --mono:'JetBrains Mono',monospace;--sans:'Figtree',sans-serif;
  --rad:12px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:13px;display:flex;flex-direction:column;-webkit-tap-highlight-color:transparent;}

/* ── TOPBAR ── */
#topbar{
  flex-shrink:0;height:50px;
  background:rgba(9,12,16,.96);backdrop-filter:blur(18px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 12px;gap:8px;
  position:relative;z-index:200;
}
.logo{display:flex;align-items:center;gap:7px;flex-shrink:0;}
.logo-mark{width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,var(--c-wind),rgba(77,208,225,.15));display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 0 12px rgba(77,208,225,.2);}
.logo-name{font-weight:900;font-size:16px;color:var(--bright);letter-spacing:-.4px;}

/* lieu tabs */
.lieu-tabs{display:flex;gap:4px;margin-left:8px;}
.lieu-tab{
  padding:4px 12px;border-radius:14px;font-size:12px;font-weight:600;
  background:transparent;border:1px solid var(--border);color:var(--dim);
  cursor:pointer;transition:all .15s;white-space:nowrap;font-family:var(--sans);
}
.lieu-tab.active{background:rgba(77,208,225,.12);border-color:rgba(77,208,225,.4);color:var(--c-wind);}

.spacer{flex:1;}
.hdr-btn{width:30px;height:30px;border-radius:7px;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.hdr-btn:hover{color:var(--bright);border-color:var(--bord2);}

/* ── SHORTCUT BAR ── */
#shortcut-bar{
  flex-shrink:0;
  display:flex;gap:5px;overflow-x:auto;
  padding:7px 12px;background:var(--bg2);border-bottom:1px solid var(--border);
  scrollbar-width:none;
}
#shortcut-bar::-webkit-scrollbar{display:none;}
.sc-btn{
  flex-shrink:0;display:flex;align-items:center;gap:5px;
  padding:4px 10px;border-radius:12px;
  background:var(--bg3);border:1px solid var(--border);
  color:var(--text);font-size:11px;font-weight:600;cursor:pointer;
  transition:all .15s;font-family:var(--sans);white-space:nowrap;
}
.sc-btn:hover{color:var(--bright);border-color:var(--bord2);}
.sc-btn .sc-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}

/* ── PERIOD BAR ── */
#period-bar{
  flex-shrink:0;
  display:flex;gap:4px;overflow-x:auto;align-items:center;
  padding:6px 12px;background:var(--bg2);border-bottom:1px solid var(--border);
  scrollbar-width:none;
}
#period-bar::-webkit-scrollbar{display:none;}
.per-btn{flex-shrink:0;padding:4px 10px;border-radius:12px;background:var(--bg3);border:1px solid var(--border);color:var(--dim);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;font-family:var(--sans);}
.per-btn.active,.per-btn:hover{background:rgba(77,208,225,.1);border-color:rgba(77,208,225,.35);color:var(--c-wind);}
.per-sep{width:1px;height:16px;background:var(--border);flex-shrink:0;margin:0 2px;}
.cal-row{
  display:none;flex-shrink:0;display:none;align-items:center;gap:6px;
  padding:5px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;
}
.cal-row.show{display:flex;}
.cal-row input[type=date]{background:transparent;border:none;color:var(--bright);font-family:var(--mono);font-size:11px;color-scheme:dark;outline:none;width:110px;}
.cal-apply{padding:3px 8px;border-radius:7px;background:var(--c-wind);border:none;color:#07090f;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--sans);}

/* ── MAIN SCROLL ── */
#main{flex:1;overflow-y:auto;overflow-x:hidden;}
#main::-webkit-scrollbar{width:3px;}
#main::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

/* ── LIEU PAGE ── */
.lieu-page{display:none;}
.lieu-page.active{display:block;}

/* ── MODULE SECTION ── */
.mod-section{padding:10px 12px 0;}
.mod-header{
  display:flex;align-items:center;gap:8px;
  padding:10px 0 8px;
  border-bottom:1px solid var(--border);
  margin-bottom:10px;
  position:sticky;top:0;z-index:10;
  background:var(--bg);
}
.mod-icon{font-size:18px;}
.mod-name{font-weight:700;font-size:15px;color:var(--bright);}
.mod-sync{font-size:10px;color:var(--dim);font-family:var(--mono);margin-left:auto;}
.mod-accent{width:3px;height:20px;border-radius:2px;flex-shrink:0;}

/* ── RT VALUES (compact inline) ── */
.rt-row{
  display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;
}
.rt-chip{
  display:flex;align-items:baseline;gap:4px;
  padding:6px 10px;border-radius:10px;
  background:var(--bg2);border:1px solid var(--border);
  position:relative;overflow:hidden;
  flex:1;min-width:90px;
}
.rt-chip::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--chip-c,var(--c-wind));}
.rt-chip-lbl{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);flex-shrink:0;white-space:nowrap;}
.rt-chip-val{font-family:var(--mono);font-size:20px;color:var(--chip-c,var(--bright));line-height:1;font-weight:500;}
.rt-chip-unit{font-size:9px;color:var(--dim);font-family:var(--mono);}
.rt-chip-badge{font-size:9px;font-weight:700;padding:1px 5px;border-radius:5px;margin-left:2px;}

/* wind compass chip */
.wind-chip{
  display:flex;align-items:center;gap:10px;
  padding:8px 10px;border-radius:10px;
  background:var(--bg2);border:1px solid var(--border);
  flex:1;min-width:180px;
  position:relative;overflow:hidden;
}
.wind-chip::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--c-wind);}
.compass{width:44px;height:44px;border-radius:50%;border:1.5px solid var(--bord2);position:relative;flex-shrink:0;background:var(--bg3);}
.c-n{position:absolute;top:1px;left:50%;transform:translateX(-50%);font-size:7px;color:var(--dim);}
.c-s{position:absolute;bottom:1px;left:50%;transform:translateX(-50%);font-size:7px;color:var(--dim);}
.c-e{position:absolute;right:2px;top:50%;transform:translateY(-50%);font-size:7px;color:var(--dim);}
.c-w{position:absolute;left:2px;top:50%;transform:translateY(-50%);font-size:7px;color:var(--dim);}
.c-arrow{position:absolute;top:50%;left:50%;width:1.5px;height:16px;background:linear-gradient(to top,var(--c-temp),transparent);transform-origin:bottom center;transform:translateX(-50%) translateY(-100%);transition:transform .5s;border-radius:1px;}
.wind-info{flex:1;}
.wind-info-row{display:flex;justify-content:space-between;align-items:baseline;border-bottom:1px solid var(--border);padding:2px 0;}
.wind-info-row:last-child{border-bottom:none;}
.wi-lbl{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;}
.wi-val{font-family:var(--mono);font-size:16px;color:var(--bright);}
.wi-u{font-size:9px;color:var(--dim);}

/* rain tiles */
.rain-row{display:flex;gap:6px;margin-bottom:10px;}
.rain-tile{flex:1;text-align:center;padding:7px 5px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;position:relative;overflow:hidden;}
.rain-tile::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--c-rain);}
.rt-lbl{font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);margin-bottom:4px;}
.rt-val{font-family:var(--mono);font-size:18px;color:var(--c-rain);}
.rt-unit{font-size:9px;color:var(--dim);}

/* ── CHART CARD ── */
.chart-card{
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--rad);
  padding:12px;margin-bottom:10px;
}
/* summary — one line */
.chart-sum{
  display:flex;gap:6px;align-items:center;flex-wrap:wrap;
  margin-bottom:8px;
  padding:6px 8px;background:var(--bg3);border-radius:8px;
  font-family:var(--mono);font-size:11px;
}
.cs-item{display:flex;align-items:baseline;gap:3px;padding:0 6px;border-right:1px solid var(--border);}
.cs-item:last-child{border-right:none;}
.cs-k{font-size:9px;color:var(--dim);letter-spacing:1px;text-transform:uppercase;}
.cs-v{font-size:13px;font-weight:500;}

/* chart tabs + stats — same row */
.chart-controls{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:8px;}
.ct-btn{padding:4px 9px;border-radius:10px;font-size:10px;font-weight:700;background:var(--bg3);border:1px solid var(--border);color:var(--dim);cursor:pointer;transition:all .15s;font-family:var(--sans);}
.ct-btn.active{color:#090c10;border-color:transparent;}
.ctrl-sep{width:1px;height:14px;background:var(--border);margin:0 2px;flex-shrink:0;}
.stog{display:flex;align-items:center;gap:3px;padding:4px 8px;border-radius:10px;background:var(--bg3);border:1px solid var(--border);font-size:10px;font-weight:600;color:var(--dim);cursor:pointer;user-select:none;transition:all .15s;}
.stog.on{border-color:currentColor;}
.stog input[type=checkbox]{margin:0;accent-color:currentColor;width:10px;height:10px;}
.chart-wrap{position:relative;height:190px;}

/* ── AUTH ── */
#auth-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:20px;z-index:999;}
.auth-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:28px 22px;max-width:380px;width:100%;}
.auth-box h2{font-size:20px;font-weight:900;color:var(--bright);margin-bottom:5px;}
.auth-box p{font-size:11px;color:var(--dim);line-height:1.7;margin-bottom:22px;}
.fg{margin-bottom:11px;}
.fg label{display:block;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--c-wind);margin-bottom:4px;}
.fg input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:9px 12px;color:var(--bright);font-family:var(--mono);font-size:12px;outline:none;transition:border-color .15s;}
.fg input:focus{border-color:var(--c-wind);}
.btn-main{width:100%;padding:11px;background:var(--c-wind);border:none;border-radius:8px;color:#07090f;font-family:var(--sans);font-size:13px;font-weight:800;cursor:pointer;transition:all .18s;}
.btn-main:hover{filter:brightness(1.1);transform:translateY(-1px);}
.err-box{background:rgba(244,67,54,.08);border:1px solid rgba(244,67,54,.25);border-radius:7px;padding:8px 11px;font-size:11px;color:#ef9a9a;margin-top:9px;display:none;}
.auth-note{font-size:9px;color:var(--dim);margin-top:14px;text-align:center;line-height:1.8;}
.auth-note a{color:var(--c-wind);text-decoration:none;}
.auth-note strong{color:var(--text2);}

/* ── LOADER ── */
.loader{text-align:center;padding:32px 20px;color:var(--dim);font-size:11px;}
.loader::before{content:'';display:block;width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--c-wind);border-radius:50%;margin:0 auto 10px;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── ALERTS / EXPORT ── */
.section-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rad);padding:12px;margin-bottom:10px;}
.sc-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.sc-title{font-size:13px;font-weight:700;color:var(--bright);}
.sm-btn{padding:4px 10px;border-radius:7px;font-size:10px;font-weight:700;background:var(--bg3);border:1px solid var(--bord2);color:var(--text2);cursor:pointer;transition:all .15s;font-family:var(--sans);}
.sm-btn:hover{border-color:var(--c-wind);color:var(--c-wind);}
.al-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding:7px 9px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;margin-bottom:5px;}
.al-row select,.al-row input[type=number]{background:var(--bg2);border:1px solid var(--border);border-radius:5px;padding:4px 7px;color:var(--bright);font-family:var(--mono);font-size:10px;outline:none;flex:1;min-width:60px;}
.badge{padding:2px 7px;border-radius:6px;font-size:9px;font-weight:700;}
.bOK{background:rgba(76,175,80,.12);color:#81c784;border:1px solid rgba(76,175,80,.2);}
.bWN{background:rgba(255,152,0,.12);color:#ffb74d;border:1px solid rgba(255,152,0,.2);}
.bAL{background:rgba(244,67,54,.12);color:#ef9a9a;border:1px solid rgba(244,67,54,.2);}
.exp-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px;}
.exp-btn{display:flex;align-items:center;gap:8px;padding:10px;background:var(--bg3);border:1px solid var(--border);border-radius:9px;cursor:pointer;transition:all .15s;color:var(--text);font-family:var(--sans);}
.exp-btn:hover{border-color:var(--c-wind);color:var(--c-wind);}

/* ── TOAST ── */
.toast{position:fixed;bottom:14px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--bg3);border:1px solid var(--bord2);border-radius:9px;padding:9px 16px;font-size:11px;z-index:9999;transition:transform .25s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;box-shadow:0 6px 24px rgba(0,0,0,.5);}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.ok{color:var(--c-wind);border-color:rgba(77,208,225,.3);}
.toast.err{color:#ef9a9a;border-color:rgba(244,67,54,.3);}

@media(max-width:360px){.rt-chip-val{font-size:17px;}.exp-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<div id="auth-screen" style="display:none">
  <div class="auth-box">
    <h2>ATMOSTAT</h2>
    <p>Identifiants Netatmo Developer pour accéder à votre station météo personnelle.</p>
    <div class="fg"><label>Client ID</label><input type="text" id="inp-cid" placeholder="na_client_id_..."></div>
    <div class="fg"><label>Client Secret</label><input type="password" id="inp-csec" placeholder="na_client_secret_..."></div>
    <button class="btn-main" onclick="startAuth()">Se connecter →</button>
    <div class="err-box" id="auth-err"></div>
    <p class="auth-note">Redirect URI à déclarer sur <a href="https://dev.netatmo.com/apps" target="_blank">dev.netatmo.com</a> :<br><strong id="redir-uri"></strong></p>
  </div>
</div>

<div id="topbar" style="display:none">
  <div class="logo">
    <div class="logo-mark">⛅</div>
    <div class="logo-name">ATMOSTAT</div>
  </div>
  <div class="lieu-tabs" id="lieu-tabs"></div>
  <div class="spacer"></div>
  <button class="hdr-btn" onclick="refreshAll()" title="Actualiser">↻</button>
  <button class="hdr-btn" onclick="logout()" title="Déconnexion">⏻</button>
</div>

<div id="shortcut-bar" style="display:none"></div>

<div id="period-bar" style="display:none">
  <button class="per-btn" data-h="0.5" onclick="setPer(this)">30min</button>
  <button class="per-btn" data-h="1" onclick="setPer(this)">1h</button>
  <button class="per-btn" data-h="6" onclick="setPer(this)">6h</button>
  <button class="per-btn" data-h="12" onclick="setPer(this)">12h</button>
  <button class="per-btn active" data-h="24" onclick="setPer(this)">24h</button>
  <button class="per-btn" data-h="168" onclick="setPer(this)">7j</button>
  <button class="per-btn" data-h="720" onclick="setPer(this)">30j</button>
  <button class="per-btn" data-h="2160" onclick="setPer(this)">3M</button>
  <button class="per-btn" data-h="8760" onclick="setPer(this)">1an</button>
  <div class="per-sep"></div>
  <button class="per-btn" onclick="togCal()" style="font-size:12px">📅</button>
  <div class="cal-row" id="cal-row">
    <span style="font-size:9px;color:var(--dim)">Du</span>
    <input type="date" id="cal-from">
    <span style="font-size:9px;color:var(--dim)">au</span>
    <input type="date" id="cal-to">
    <button class="cal-apply" onclick="appCal()">OK</button>
  </div>
</div>

<div id="main" style="display:none"></div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════
// CONFIG & STATE
// ═══════════════════════════════════════
const REDIRECT=location.href.split('?')[0].split('#')[0];
document.getElementById('redir-uri').textContent=REDIRECT;

const S={
  token:localStorage.getItem('na_tok'),
  refresh:localStorage.getItem('na_ref'),
  expiry:+localStorage.getItem('na_exp')||0,
  cid:localStorage.getItem('na_cid')||'',
  csec:localStorage.getItem('na_csec')||'',
  devices:[],lieu:0,
  charts:{},chartData:{},
  alerts:JSON.parse(localStorage.getItem('na_alerts')||'[]'),
  stats:{min:false,max:false,avg:false},
  hours:24,customFrom:null,customTo:null,
};
if(S.cid)document.getElementById('inp-cid').value=S.cid;

// ── BEAUFORT & HELPERS ──
const BFT=[[0.5,'Calme'],[1.5,'Très légère brise'],[3.3,'Légère brise'],[5.5,'Petite brise'],[7.9,'Jolie brise'],[10.7,'Brise fraîche'],[13.8,'Vent frais'],[17,'Grand frais'],[20.7,'Coup de vent'],[24.4,'Fort coup de vent'],[28.4,'Tempête'],[32.6,'Violente tempête'],[999,'Ouragan']];
function beaufort(kmh){const ms=kmh/3.6;for(let i=0;i<BFT.length;i++)if(ms<BFT[i][0])return{bft:i,desc:BFT[i][1]};return{bft:12,desc:'Ouragan'};}
function dewPoint(t,h){const a=17.271,b=237.7,g=(a*t)/(b+t)+Math.log(h/100);return(b*g)/(a-g);}
function windDir(deg){return['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSO','SO','OSO','O','ONO','NO','NNO'][Math.round(deg/22.5)%16];}
function tCol(t){if(typeof t!=='number')return'var(--bright)';if(t<0)return'#90caf9';if(t<10)return'#4fc3f7';if(t<20)return'#a5d86e';if(t<30)return'#ffa94d';return'#ff6b6b';}
function co2Q(v){if(v<800)return{l:'Bon',s:'background:rgba(76,175,80,.15);color:#81c784'};if(v<1200)return{l:'Moyen',s:'background:rgba(255,152,0,.15);color:#ffb74d'};return{l:'Mauvais',s:'background:rgba(244,67,54,.15);color:#ef9a9a'};}
function fmtSync(u){if(!u)return'—';const d=new Date(u*1000),diff=Math.round((Date.now()-d)/60000);if(diff<1)return'À l\'instant';if(diff<60)return`Il y a ${diff}min`;return d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});}

// ═══════════════════════════════════════
// AUTH
// ═══════════════════════════════════════
function startAuth(){
  const cid=document.getElementById('inp-cid').value.trim(),csec=document.getElementById('inp-csec').value.trim();
  if(!cid||!csec){document.getElementById('auth-err').textContent='Remplissez les deux champs.';document.getElementById('auth-err').style.display='block';return;}
  localStorage.setItem('na_cid',cid);localStorage.setItem('na_csec',csec);S.cid=cid;S.csec=csec;
  location.href='https://api.netatmo.com/oauth2/authorize?'+new URLSearchParams({client_id:cid,redirect_uri:REDIRECT,scope:'read_station',response_type:'code',state:'x'});
}
async function handleCode(){
  const code=new URLSearchParams(location.search).get('code');if(!code)return false;
  history.replaceState({},'',REDIRECT);
  try{
    const r=await fetch('https://api.netatmo.com/oauth2/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body:new URLSearchParams({grant_type:'authorization_code',code,redirect_uri:REDIRECT,client_id:localStorage.getItem('na_cid'),client_secret:localStorage.getItem('na_csec')})});
    const d=await r.json();if(d.access_token){saveTok(d);return true;}
    document.getElementById('auth-err').textContent=d.error_description||d.error;document.getElementById('auth-err').style.display='block';return false;
  }catch(e){document.getElementById('auth-err').textContent=e.message;document.getElementById('auth-err').style.display='block';return false;}
}

async function ensureTok(){
  if(S.token&&Date.now()<S.expiry-60000)return true;

}

async function apiGet(ep,params={}){
  if(!await ensureTok())throw new Error('Session expirée');
  const u=new URL('https://api.netatmo.com/api'+ep);
  Object.entries(params).forEach(([k,v])=>u.searchParams.set(k,v));
  const r=await fetch(u,{headers:{Authorization:'Bearer '+S.token}});
  const d=await r.json();if(d.error)throw new Error(d.error.message||JSON.stringify(d.error));return d;
}

function getRange(){if(S.customFrom&&S.customTo)return{from:S.customFrom,to:S.customTo};return{from:Date.now()-S.hours*3600000,to:Date.now()};}

// ═══════════════════════════════════════
// DATA NORMALIZATION — align to fixed slots
// ═══════════════════════════════════════
/**
 * Resample raw Netatmo data onto regular time slots using LTTB + bin averaging.
 * Method:
 *   1. Parse raw {timestamp: [value]} into sorted [{t,v}] array
 *   2. Determine slot interval based on requested period (slotMinutes)
 *   3. Bin all raw points into their slot bucket, compute average per bucket
 *   4. Interpolate missing slots linearly from neighbours (max 2 consecutive gaps)
 * This gives scientifically sound, regularly-spaced time series aligned to
 * clock boundaries (08:00, 08:15, 08:30…) regardless of Netatmo polling jitter.
 */
function resample(raw, hours){
  const pts=Object.entries(raw).map(([ts,arr])=>{const v=Array.isArray(arr)?arr[0]:arr;return v!=null?{t:parseInt(ts)*1000,v}:null;}).filter(Boolean).sort((a,b)=>a.t-b.t);
  if(!pts.length)return[];

  // Choose slot width (minutes) — targets ~150-300 points for readability
  let slotMin;
  if(hours<=1)slotMin=5;
  else if(hours<=6)slotMin=15;
  else if(hours<=24)slotMin=30;
  else if(hours<=72)slotMin=60;
  else if(hours<=168)slotMin=180;
  else if(hours<=720)slotMin=360;
  else slotMin=1440;

  const slotMs=slotMin*60000;
  const{from,to}=getRange();

  // Align start to slot boundary
  const startSlot=Math.floor(from/slotMs)*slotMs;
  const endSlot=Math.ceil(to/slotMs)*slotMs;

  // Build buckets
  const buckets={};
  pts.forEach(p=>{
    const slot=Math.floor(p.t/slotMs)*slotMs;
    if(!buckets[slot])buckets[slot]=[];
    buckets[slot].push(p.v);
  });

  // Build regular grid, fill with averages
  const result=[];
  for(let t=startSlot;t<=endSlot;t+=slotMs){
    const b=buckets[t];
    if(b&&b.length){
      const avg=b.reduce((a,c)=>a+c,0)/b.length;
      result.push({t,v:Math.round(avg*10)/10,real:true});
    }else{
      result.push({t,v:null,real:false});
    }
  }

  // Linear interpolation for small gaps (max 3 consecutive nulls)
  for(let i=1;i<result.length-1;i++){
    if(result[i].v!==null)continue;
    let left=-1,right=-1;
    for(let j=i-1;j>=0&&i-j<=3;j--){if(result[j].v!==null){left=j;break;}}
    for(let j=i+1;j<result.length&&j-i<=3;j++){if(result[j].v!==null){right=j;break;}}
    if(left>=0&&right>=0){
      const frac=(result[i].t-result[left].t)/(result[right].t-result[left].t);
      result[i].v=Math.round((result[left].v+(result[right].v-result[left].v)*frac)*10)/10;
      result[i].interpolated=true;
    }
  }

  return result.filter(p=>p.v!==null);
}

function fmtLbl(t,hours){
  const d=new Date(t);
  if(hours<=1)return d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  if(hours<=24)return d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  if(hours<=72)return d.toLocaleDateString('fr-FR',{weekday:'short'})+' '+d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  if(hours<=168)return d.toLocaleDateString('fr-FR',{weekday:'short',hour:'2-digit'});
  if(hours<=720)return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'short'});
  return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'2-digit'});
}

  lieu.devs.forEach(dev=>{
    mods.push({type:'indoor',did:dev._id,mid:null,name:dev.station_name,data:dev.dashboard_data||{},icon:'🏠',id:'mod-'+dev._id+'-main'});

    });
  });

}

async function loadOutChart(m,pid){
  const cc=document.querySelector(`#${pid} .chart-card`);
  const active=cc?.querySelector('.ct-btn.active');
  const sensor=active?.dataset.s||'Temperature';
  const cfgMap={Temperature:{label:'Température',unit:'°C',color:'var(--c-temp)'},Humidity:{label:'Humidité',unit:'%',color:'var(--c-hum)'},dewpoint:{label:'Pt de rosée',unit:'°C',color:'var(--c-dew)'}};
  const cfg=cfgMap[sensor];
  const{from,to}=getRange(),hours=S.hours||(to-from)/3600000;
  try{
    let pts;
    if(sensor==='dewpoint'){
      const raw=await getMeasure(m.did,m.mid,['Temperature','Humidity'],from,to,pickScale(hours));
      pts=Object.entries(raw).map(([ts,arr])=>{if(!Array.isArray(arr)||arr[0]==null||arr[1]==null)return null;return{t:parseInt(ts)*1000,v:dewPoint(arr[0],arr[1])};}).filter(Boolean).sort((a,b)=>a.t-b.t);
      // resample dewpoint series
      const fakeRaw={};pts.forEach(p=>{fakeRaw[Math.floor(p.t/1000)]=[p.v];});
      pts=resample(fakeRaw,hours);
    }else{
      const raw=await getMeasure(m.did,m.mid,[sensor],from,to,pickScale(hours));
      pts=resample(raw,hours);
    }
    S.chartData[pid]={pts,cfg,m,sensor};
    drawLine(pid,pts,cfg,hours);
  }catch(e){toast('Erreur: '+e.message,'err');}
}

  const{from,to}=getRange(),hours=S.hours||(to-from)/3600000;

  try{
    if(t==='daily'){
      const raw=await getMeasure(m.did,m.mid,['sum_rain'],Date.now()-30*864e5,Date.now(),'1day');
      const pts=Object.entries(raw).map(([ts,arr])=>{const v=Array.isArray(arr)?arr[0]:arr;return v!=null?{t:parseInt(ts)*1000,v}:null;}).filter(Boolean).sort((a,b)=>a.t-b.t);
      S.chartData[pid]={pts,cfg:{...cfg,label:'Pluie journalière'},m};
      drawBar(pid,pts,{...cfg,label:'Pluie journalière'},720);
    }else if(t==='cumul'){
      const raw=await getMeasure(m.did,m.mid,['sum_rain'],from,to,pickScale(hours));
      const pts=resample(raw,hours);let cum=0;
      const cumPts=pts.map(p=>({t:p.t,v:Math.round((cum+=p.v)*10)/10}));
      S.chartData[pid]={pts:cumPts,cfg:{...cfg,label:'Cumul pluie'},m};
      drawLine(pid,cumPts,{...cfg,label:'Cumul pluie'},hours,true);
    }else{
      const raw=await getMeasure(m.did,m.mid,['Rain'],from,to,pickScale(hours));
      const pts=resample(raw,hours);
      S.chartData[pid]={pts,cfg:{...cfg,unit:'mm/h'},m};
      drawBar(pid,pts,{...cfg,unit:'mm/h'},hours);
    }
  }catch(e){toast('Erreur pluie: '+e.message,'err');}
}

function selRainTab(btn,pid){
  btn.closest('.chart-controls').querySelectorAll('.ct-btn').forEach(b=>{b.classList.remove('active');b.style.background='';});
  btn.classList.add('active');btn.style.background='var(--c-rain)';
  if(S.charts[pid+'-chart']){S.charts[pid+'-chart'].destroy();delete S.charts[pid+'-chart'];}
  const m=S.currentMods.find(x=>x.id===pid);if(m)loadRainChart(m,pid);
}

// ═══════════════════════════════════════
// WIND
// ═══════════════════════════════════════
function renderWind(sec,m){
  const d=m.data,wind=d.WindStrength??0,gust=d.GustStrength??0,angle=d.WindAngle??0;
  const bft=beaufort(wind),dir=windDir(angle);
  sec.innerHTML=`
    ${modHeaderHTML(m)}
    <div class="rt-row">
      <div class="wind-chip">
        <div class="compass">
          <div class="c-n">N</div><div class="c-s">S</div><div class="c-e">E</div><div class="c-w">O</div>
          <div class="c-arrow" style="transform:translateX(-50%) translateY(-100%) rotate(${angle}deg)"></div>
        </div>
        <div class="wind-info">
          <div class="wind-info-row"><span class="wi-lbl">Vent moy.</span><span><span class="wi-val" style="color:var(--c-wind)">${wind}</span> <span class="wi-u">km/h · ${bft.bft}Bft</span></span></div>
          <div class="wind-info-row"><span class="wi-lbl">Rafales</span><span><span class="wi-val" style="color:var(--c-gust)">${gust}</span> <span class="wi-u">km/h</span></span></div>
          <div class="wind-info-row"><span class="wi-lbl">Direction</span><span style="font-family:var(--mono);font-size:13px;color:var(--bright)">${angle}° (${dir})</span></div>
        </div>
      </div>
      <div class="rt-chip" style="--chip-c:var(--c-hum);min-width:120px">
        <div><div class="rt-chip-lbl">${bft.desc}</div><div style="display:flex;align-items:baseline;gap:3px"><span class="rt-chip-val" style="font-size:16px">${bft.bft}</span><span class="rt-chip-unit">Bft</span></div></div>
      </div>
    </div>`;
  appendWindChart(sec,m);
  appendExport(sec,m.id);
}

function appendWindChart(sec,m){
  const pid=m.id;
  const cc=document.createElement('div');cc.className='chart-card';
  cc.innerHTML=`
    <div class="chart-controls">
      <button class="ct-btn active" style="background:var(--c-wind)" data-t="dual" onclick="selWindTab(this,'${pid}')">💨 Vent & Rafales</button>
      <button class="ct-btn" data-t="dir" onclick="selWindTab(this,'${pid}')">🧭 Direction</button>
    </div>
    <div class="chart-sum" id="${pid}-sum"><span style="color:var(--dim);font-size:10px">Chargement...</span></div>
    <div class="chart-wrap"><canvas id="${pid}-chart"></canvas></div>`;
  sec.appendChild(cc);
  loadWindChart(m,pid);
}

async function loadWindChart(m,pid){
  const cc=document.querySelector(`#${pid} .chart-card`);
  const t=cc?.querySelector('.ct-btn.active')?.dataset.t||'dual';
  const{from,to}=getRange(),hours=S.hours||(to-from)/3600000;
  try{
    if(t==='dir'){
      const raw=await getMeasure(m.did,m.mid,['WindAngle'],from,to,pickScale(hours));
      const pts=resample(raw,hours);
      drawLine(pid,pts,{label:'Direction',unit:'°',color:'var(--c-pres)'},hours);
    }else{
      const[rawW,rawG]=await Promise.all([
        getMeasure(m.did,m.mid,['WindStrength'],from,to,pickScale(hours)),
        getMeasure(m.did,m.mid,['GustStrength'],from,to,pickScale(hours))
      ]);
      const pW=resample(rawW,hours),pG=resample(rawG,hours);
      S.chartData[pid]={pts:pW,cfg:{label:'Vent',unit:'km/h',color:'var(--c-wind)'},m};
      drawDual(pid,pW,pG,hours);
    }
  }catch(e){toast('Erreur vent: '+e.message,'err');}
}

function selWindTab(btn,pid){
  btn.closest('.chart-controls').querySelectorAll('.ct-btn').forEach(b=>{b.classList.remove('active');b.style.background='';});
  btn.classList.add('active');btn.style.background='var(--c-wind)';
  if(S.charts[pid+'-chart']){S.charts[pid+'-chart'].destroy();delete S.charts[pid+'-chart'];}
  const m=S.currentMods.find(x=>x.id===pid);if(m)loadWindChart(m,pid);
}

// ═══════════════════════════════════════
// CHART RENDERING
// ═══════════════════════════════════════
const COPTS={
  responsive:true,maintainAspectRatio:false,
  interaction:{intersect:false,mode:'index'},
  plugins:{
    legend:{display:false},
    tooltip:{backgroundColor:'#0e1219',borderColor:'#1d2b38',borderWidth:1,titleColor:'#2e4255',bodyColor:'#deeef8',titleFont:{family:'JetBrains Mono',size:10},bodyFont:{family:'JetBrains Mono',size:11}}
  },
  scales:{
    x:{ticks:{color:'#2e4255',font:{family:'JetBrains Mono',size:9},maxTicksLimit:8},grid:{color:'#131820'},border:{color:'#131820'}},
    y:{ticks:{color:'#2e4255',font:{family:'JetBrains Mono',size:9}},grid:{color:'#131820'},border:{color:'#131820'}},
  }
};

// Resolve CSS var to actual color for canvas gradients
function resolveColor(c){
  if(!c.startsWith('var('))return c;
  const name=c.match(/var\(([^)]+)\)/)[1];
  return getComputedStyle(document.documentElement).getPropertyValue(name).trim()||'#4dd0e1';
}

function drawLine(pid,pts,cfg,hours,fill=true){
  const key=pid+'-chart',canvas=document.getElementById(key);if(!canvas)return;
  const ctx=canvas.getContext('2d');if(S.charts[key])S.charts[key].destroy();
  const col=resolveColor(cfg.color);
  const gr=ctx.createLinearGradient(0,0,0,190);gr.addColorStop(0,col+'55');gr.addColorStop(1,col+'00');
  const vals=pts.map(p=>p.v),mn=vals.length?Math.min(...vals):0,mx=vals.length?Math.max(...vals):0,avg=vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:0;
  const ds=[{label:cfg.label,data:vals,borderColor:col,backgroundColor:fill?gr:'transparent',borderWidth:1.5,fill,tension:.3,pointRadius:0,pointHoverRadius:4,order:1}];
  if(S.stats.min)ds.push({label:'Min',data:vals.map(()=>mn),borderColor:'#4fc3f7',borderWidth:1,borderDash:[4,4],pointRadius:0,fill:false,tension:0,order:2});
  if(S.stats.max)ds.push({label:'Max',data:vals.map(()=>mx),borderColor:'#ff6b6b',borderWidth:1,borderDash:[4,4],pointRadius:0,fill:false,tension:0,order:3});
  if(S.stats.avg)ds.push({label:'Moy',data:vals.map(()=>avg),borderColor:'#ffa94d',borderWidth:1,borderDash:[6,3],pointRadius:0,fill:false,tension:0,order:4});
  const opts=JSON.parse(JSON.stringify(COPTS));
  opts.plugins.tooltip.callbacks={label:c=>` ${c.dataset.label}: ${typeof c.parsed.y==='number'?c.parsed.y.toFixed(1):c.parsed.y} ${cfg.unit}`};
  S.charts[key]=new Chart(ctx,{type:'line',data:{labels:pts.map(p=>fmtLbl(p.t,hours)),datasets:ds},options:opts});
  mkSum(pid,vals,cfg);
}

function drawBar(pid,pts,cfg,hours){
  const key=pid+'-chart',canvas=document.getElementById(key);if(!canvas)return;
  const ctx=canvas.getContext('2d');if(S.charts[key])S.charts[key].destroy();
  const col=resolveColor(cfg.color);
  const vals=pts.map(p=>p.v);
  const opts=JSON.parse(JSON.stringify(COPTS));
  opts.plugins.tooltip.callbacks={label:c=>` ${c.parsed.y.toFixed(1)} ${cfg.unit}`};
  S.charts[key]=new Chart(ctx,{type:'bar',data:{labels:pts.map(p=>fmtLbl(p.t,hours)),datasets:[{label:cfg.label,data:vals,backgroundColor:col+'99',borderColor:col,borderWidth:1,borderRadius:3}]},options:opts});
  mkSum(pid,vals,cfg);
}

function drawDual(pid,pW,pG,hours){
  const key=pid+'-chart',canvas=document.getElementById(key);if(!canvas)return;
  const ctx=canvas.getContext('2d');if(S.charts[key])S.charts[key].destroy();
  const col=resolveColor('var(--c-wind)'),colG=resolveColor('var(--c-gust)');
  const gr=ctx.createLinearGradient(0,0,0,190);gr.addColorStop(0,col+'44');gr.addColorStop(1,col+'00');
  const opts=JSON.parse(JSON.stringify(COPTS));
  opts.plugins.legend.display=true;
  opts.plugins.legend.labels={color:'#7090a8',font:{family:'JetBrains Mono',size:9},boxWidth:10};
  opts.plugins.tooltip.callbacks={label:c=>` ${c.dataset.label}: ${c.parsed.y.toFixed(1)} km/h`};
  S.charts[key]=new Chart(ctx,{type:'line',data:{
    labels:pW.map(p=>fmtLbl(p.t,hours)),
    datasets:[
      {label:'Vent moy.',data:pW.map(p=>p.v),borderColor:col,backgroundColor:gr,borderWidth:1.5,fill:true,tension:.3,pointRadius:0},
      {label:'Rafales',data:pG.map(p=>p.v),borderColor:colG,backgroundColor:'transparent',borderWidth:1.5,fill:false,tension:.3,pointRadius:0,borderDash:[4,3]},
    ]
  },options:opts});
  mkSum(pid,pW.map(p=>p.v),{label:'Vent',unit:'km/h',color:'var(--c-wind)'});
}

function mkSum(pid,vals,cfg){
  const el=document.getElementById(pid+'-sum');if(!el||!vals.length)return;
  const mn=Math.min(...vals),mx=Math.max(...vals),avg=vals.reduce((a,b)=>a+b,0)/vals.length;
  const col=resolveColor(cfg.color);
  el.innerHTML=`
    <div class="cs-item"><span class="cs-k">MIN</span> <span class="cs-v" style="color:#4fc3f7">${mn.toFixed(1)}</span><span style="font-size:9px;color:var(--dim)">${cfg.unit}</span></div>
    <div class="cs-item"><span class="cs-k">MAX</span> <span class="cs-v" style="color:#ff6b6b">${mx.toFixed(1)}</span><span style="font-size:9px;color:var(--dim)">${cfg.unit}</span></div>
    <div class="cs-item"><span class="cs-k">MOY</span> <span class="cs-v" style="color:#ffa94d">${avg.toFixed(1)}</span><span style="font-size:9px;color:var(--dim)">${cfg.unit}</span></div>
    <div class="cs-item"><span class="cs-k">PTS</span> <span class="cs-v" style="color:var(--dim)">${vals.length}</span></div>`;
}

function togStat(key,pid){
  S.stats[key]=!S.stats[key];
  // update all visible stog buttons for this key
  document.querySelectorAll(`#${pid} .stog`).forEach(el=>{
    const onclick=el.getAttribute('onclick')||'';
    if(onclick.includes(`'${key}'`)){el.classList.toggle('on',S.stats[key]);el.querySelector('input').checked=S.stats[key];}
  });
  const data=S.chartData[pid];
  if(data&&data.pts){
    if(S.charts[pid+'-chart']){S.charts[pid+'-chart'].destroy();delete S.charts[pid+'-chart'];}
    drawLine(pid,data.pts,data.cfg,S.hours||24);
  }
}

// ═══════════════════════════════════════
// ALERTS
// ═══════════════════════════════════════
function appendAlerts(sec,pid){
  const div=document.createElement('div');div.className='section-card';
  div.innerHTML=`<div class="sc-hd"><div class="sc-title">⚡ Alertes</div><button class="sm-btn" onclick="addAl('${pid}')">+ Ajouter</button></div><div id="${pid}-alerts"></div><div id="${pid}-alst" style="font-size:10px;margin-top:5px;color:var(--dim)"></div>`;
  sec.appendChild(div);renderAlerts(pid);
}
function renderAlerts(pid){
  const el=document.getElementById(pid+'-alerts');if(!el)return;
  const my=S.alerts.filter(a=>a.p===pid);
  if(!my.length){el.innerHTML='<div style="font-size:10px;color:var(--dim)">Aucune alerte.</div>';return;}
  el.innerHTML=my.map(a=>{const i=S.alerts.indexOf(a);return`<div class="al-row">
    <select onchange="updAl(${i},'sensor',this.value)">${[['Temperature','🌡 Temp.'],['Humidity','💧 Hum.'],['CO2','🌿 CO₂'],['Noise','🔊 Bruit'],['Pressure','📊 Pression'],['WindStrength','💨 Vent'],['Rain','🌧 Pluie']].map(([k,l])=>`<option value="${k}"${a.sensor===k?' selected':''}>${l}</option>`).join('')}</select>
    <select onchange="updAl(${i},'op',this.value)" style="max-width:80px"><option value=">"${a.op==='>'?' selected':''}>&gt; sup.</option><option value="<"${a.op==='<'?' selected':''}>&lt; inf.</option></select>
    <input type="number" value="${a.threshold}" step="0.1" onchange="updAl(${i},'threshold',parseFloat(this.value))" style="max-width:60px">
    <span class="badge ${a.status==='danger'?'bAL':a.status==='warning'?'bWN':'bOK'}">${a.status==='danger'?'🔴':a.status==='warning'?'🟡':'🟢'} ${a.status==='danger'?'Alerte':a.status==='warning'?'Proche':'OK'}</span>
    <button class="hdr-btn" style="flex-shrink:0;width:26px;height:26px" onclick="delAl(${i},'${pid}')">✕</button>
  </div>`;}).join('');
}
function addAl(p){S.alerts.push({p,sensor:'Temperature',op:'>',threshold:30,status:'ok'});saveAl();renderAlerts(p);}
function updAl(i,k,v){S.alerts[i][k]=v;saveAl();}
function delAl(i,p){S.alerts.splice(i,1);saveAl();renderAlerts(p);}
function saveAl(){localStorage.setItem('na_alerts',JSON.stringify(S.alerts));}

// ═══════════════════════════════════════
// EXPORT
// ═══════════════════════════════════════
function appendExport(sec,pid){
  const div=document.createElement('div');div.className='section-card';
  div.innerHTML=`<div class="sc-title" style="margin-bottom:8px">📤 Export</div><div class="exp-grid"><button class="exp-btn" onclick="doExp('${pid}','csv')"><span style="font-size:18px">📊</span><span><div style="font-size:11px;font-weight:700">CSV</div><div style="font-size:9px;color:var(--dim)">Excel/Sheets</div></span></button><button class="exp-btn" onclick="doExp('${pid}','json')"><span style="font-size:18px">📋</span><span><div style="font-size:11px;font-weight:700">JSON</div><div style="font-size:9px;color:var(--dim)">Format structuré</div></span></button></div>`;
  sec.appendChild(div);
}
function doExp(pid,fmt){
  const data=S.chartData[pid];if(!data){toast('Chargez un graphique','err');return;}
  const{pts,cfg}=data,fname=`netatmo_${(cfg.label||'data').replace(/\s/g,'_')}_${new Date().toISOString().slice(0,10)}`;
  if(fmt==='csv'){const lines=[`Datetime,${cfg.label} (${cfg.unit}),Timestamp`];pts.forEach(p=>lines.push(`"${new Date(p.t).toLocaleString('fr-FR')}",${p.v},${p.t}`));dl(lines.join('\n'),fname+'.csv','text/csv');toast('CSV exporté ✓');}
  else{dl(JSON.stringify({label:cfg.label,unit:cfg.unit,exported:new Date().toISOString(),data:pts.map(p=>({datetime:new Date(p.t).toISOString(),value:p.v}))},null,2),fname+'.json','application/json');toast('JSON exporté ✓');}
}
function dl(c,n,t){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([c],{type:t}));a.download=n;a.click();}

// ═══════════════════════════════════════
// TOAST
// ═══════════════════════════════════════
let _tt;
function toast(msg,type='ok'){const el=document.getElementById('toast');el.textContent=msg;el.className=`toast show ${type}`;clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),3000);}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
async function init(){
  if(location.search.includes('code=')){const ok=await handleCode();if(!ok){document.getElementById('auth-screen').style.display='flex';return;}}
  if(S.token){
    ['topbar','shortcut-bar','period-bar','main'].forEach(id=>document.getElementById(id).style.display='');
    document.getElementById('period-bar').style.display='flex';
    document.getElementById('shortcut-bar').style.display='flex';
    try{await refreshAll();}catch(e){toast('Reconnexion nécessaire','err');setTimeout(logout,2000);}
  }else{document.getElementById('auth-screen').style.display='flex';}
}
init();
</script>
